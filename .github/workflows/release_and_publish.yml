name: Release and Publish

on:
  pull_request:
    types: [closed]

jobs:
  tag_and_release:
    if: >-
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'release') &&
      github.base_ref == 'main'
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get current version from Xcode project
        id: get_version
        run: |
          version=$(./scripts/project_tools.sh version get)
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Get changelog for this version
        id: changelog
        run: |
          version="${{ steps.get_version.outputs.version }}"
          awk -v ver="$version" '/^## \["ver"\]/, /^## \[/{if ($0 ~ /^## \[/ && NR!=1) exit; print}' docs/CHANGELOG.md | sed '1d' > changes.txt
          echo 'changelog<<EOF' >> $GITHUB_OUTPUT
          cat changes.txt >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag v${{ steps.get_version.outputs.version }}
          git push origin v${{ steps.get_version.outputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          name: v${{ steps.get_version.outputs.version }}
          body: ${{ steps.changelog.outputs.changelog }}

      - name: Delete source branch
        if: github.event.pull_request.head.ref != 'main'
        run: |
          gh pr delete ${{ github.event.pull_request.head.ref }} --yes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
