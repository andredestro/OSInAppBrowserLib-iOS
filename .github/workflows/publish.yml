name: Publish

on:
  release:
    types: [published]

env:
  PROJECT_NAME: OSInAppBrowserLib
  
jobs:
  publish:
    name: Publish Pod to CocoaPods
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install CocoaPods
        run: gem install cocoapods

      - name: Publish Pod
        env:
          COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}
          PODSPEC_FILE: ${{ env.PODSPEC_FILE || format('{0}.podspec', env.PROJECT_NAME) }}
        run: |
          set -euo pipefail
          if [ -z "${COCOAPODS_TRUNK_TOKEN:-}" ]; then
            echo "❌ COCOAPODS_TRUNK_TOKEN secret is not set. Please set it in your repository secrets."
            exit 1
          fi
          echo "🚀 Deploying podspec to CocoaPods..."
          PODSPEC_PATH="./$PODSPEC_FILE"
          if [ -f "$PODSPEC_PATH" ]; then
            pod trunk push "$PODSPEC_PATH" --allow-warnings
          else
            echo "❌ Podspec not found at $PODSPEC_PATH, please ensure it exists."
            exit 1
          fi
