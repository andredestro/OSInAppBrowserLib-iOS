name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

env:
  PROJECT_NAME: OSInAppBrowserLib

jobs:
  prepare-release:
    name: Prepare Release
    runs-on: macos-latest
    if: github.ref_name == 'main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Dependencies
        uses: ./.github/actions/install-dependencies
        with:
          tools: gh

      - name: Get current project version
        id: get_version
        uses: ./.github/actions/get-project-version
        with:
          project_name: ${{ env.PROJECT_NAME }}

      - name: Bump project version
        id: bump_version
        env:
          CURRENT_VERSION: ${{ steps.get_version.outputs.version }}
          BUMP_TYPE: ${{ github.event.inputs.bump }}
        run: |
          set -euo pipefail
          echo "⬆️ Bumping project version..."
          if [[ "$BUMP_TYPE" =~ ^[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
            NEW_VERSION="$BUMP_TYPE"
          else
            IFS='.' read -r major minor patch <<< "$CURRENT_VERSION"
            patch="${patch:-0}"
            case "$BUMP_TYPE" in
              major)
                major=$((major+1)); minor=0; patch=0;;
              minor)
                minor=$((minor+1)); patch=0;;
              *)
                patch=$((patch+1));;
            esac
            NEW_VERSION="$major.$minor.$patch"
          fi
          echo "🔢 New version: $NEW_VERSION"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Update project files
        env:
          PBXPROJ: ${{ env.PBXPROJ || format('{0}.xcodeproj/project.pbxproj', env.PROJECT_NAME) }}
          PODSPEC_FILE: ${{ env.PODSPEC_FILE || format('{0}.podspec', env.PROJECT_NAME) }}
          CHANGELOG_PATH: ${{ env.CHANGELOG_PATH || 'docs/CHANGELOG.md' }}
          NEW_VERSION: ${{ steps.bump_version.outputs.new_version }}
        run: |
          set -euo pipefail
          
          echo "🛠️ Updating MARKETING_VERSION to $NEW_VERSION..."
          sed -i '' -E "s/MARKETING_VERSION = [0-9]+\.[0-9]+(\.[0-9]+)?;/MARKETING_VERSION = $NEW_VERSION;/g" "$PBXPROJ"
          echo "🛠️ Updating CURRENT_PROJECT_VERSION..."
          current_proj_version=$(grep -m1 'CURRENT_PROJECT_VERSION =' "$PBXPROJ" | sed -E 's/.*CURRENT_PROJECT_VERSION = ([0-9]+);/\1/')
          new_proj_version=$((current_proj_version+1))
          sed -i '' -E "s/CURRENT_PROJECT_VERSION = [0-9]+;/CURRENT_PROJECT_VERSION = $new_proj_version;/g" "$PBXPROJ"
          echo "✅ Bumped MARKETING_VERSION to $NEW_VERSION, CURRENT_PROJECT_VERSION to $new_proj_version"

          echo "🛠️ Updating version in podspec to $NEW_VERSION..."
          if [ -f "$PODSPEC_FILE" ]; then
            sed -i '' -E "s/(s.version\s*=\s*\")[0-9]+\.[0-9]+(\.[0-9]+)?(\")/\1$NEW_VERSION\3/" "$PODSPEC_FILE"
            echo "✅ Podspec version updated to $NEW_VERSION"
          else
            echo "⚠️ Podspec file not found: $PODSPEC_FILE"
          fi

          echo "📝 Updating CHANGELOG.md for version $NEW_VERSION..."
          TODAY=$(date +%Y-%m-%d)
          awk -v ver="$NEW_VERSION" -v today="$TODAY" '
            BEGIN { unreleased_found=0 }
            /^## \[Unreleased\]/ {
              print $0; print ""; print "## [" ver "] - " today; unreleased_found=1; next
            }
            { print $0 }
          ' "$CHANGELOG_PATH" > "$CHANGELOG_PATH.tmp" && mv "$CHANGELOG_PATH.tmp" "$CHANGELOG_PATH"
          echo "✅ CHANGELOG updated for version $NEW_VERSION"

      - name: Create release branch, commit and push changes
        id: create_release_branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.bump_version.outputs.new_version }}
        run: |
          set -euo pipefail
          BRANCH_NAME="release/v$VERSION"
          git config user.name "github-actions[bot] (on behalf of ${{ github.actor }})"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH_NAME"
          git add .
          git commit -m "chore(release): prepare release v$VERSION"
          git push origin "$BRANCH_NAME"
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT

      - name: Ensure 'release' label exists
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh label create release --color FFD700 --description "Release PRs" || true

      - name: Create Pull Request
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.bump_version.outputs.new_version }}
          BRANCH_NAME: ${{ steps.create_release_branch.outputs.branch_name }}
        run: |
          set -euo pipefail
          gh pr create \
            --title "Release v$VERSION" \
            --body "Automated PR to release v$VERSION." \
            --head $BRANCH_NAME \
            --base main \
            --label release

      - name: Build XCFramework
        id: build_xcframework
        uses: ./.github/actions/build-xcframework
        with:
          project_name: ${{ env.PROJECT_NAME }}

      - name: Package XCFramework and LICENSE
        id: package
        env:
          VERSION: ${{ steps.bump_project_version.outputs.new_version }}
          XCFRAMEWORK_PATH: ${{ steps.build_xcframework.outputs.xcframework_path }}
        run: |
          set -euo pipefail
          ZIP_NAME="$PROJECT_NAME-$VERSION.zip"
          mkdir -p release
          cp -R $XCFRAMEWORK_PATH release/
          cp docs/LICENSE release/
          cd release
          zip -r ../$ZIP_NAME .
          echo "✅ Packaged XCFramework and LICENSE into $ZIP_NAME"
          echo "zip_name=$ZIP_NAME" >> $GITHUB_OUTPUT

      - name: Upload Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }} ${{ steps.bump_project_version.outputs.new_version }}
          path: ${{ steps.package.outputs.zip_name }}
